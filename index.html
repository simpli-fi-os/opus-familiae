<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Countdown</title>
<meta name="description" content="A family of six. Ten ventures. One goal.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  /* ============================================
     CONFIG: Update these values manually or wire
     to Supabase/LottOS API endpoint later.
     ============================================ */

  :root {
    --bg-deep: #0a0c10;
    --bg-card: #0c0f14;
    --gold: #c47a2a;
    --gold-dim: rgba(196, 122, 42, 0.15);
    --gold-faint: rgba(196, 122, 42, 0.06);
    --text-primary: #f5f0eb;
    --text-secondary: #b8b0a5;
    --text-muted: #6b6560;
    --text-dim: #3d3a37;
    --blue-glow: #1a5276;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* ---- Atmospheric background ---- */
  .atmosphere {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(140px);
  }

  .glow-warm {
    width: 600px;
    height: 600px;
    background: var(--gold);
    opacity: 0.07;
    top: -15%;
    right: -5%;
    animation: drift-warm 20s ease-in-out infinite alternate;
  }

  .glow-cool {
    width: 500px;
    height: 500px;
    background: var(--blue-glow);
    opacity: 0.04;
    bottom: -10%;
    left: -10%;
    animation: drift-cool 25s ease-in-out infinite alternate;
  }

  .glow-center {
    width: 400px;
    height: 400px;
    background: var(--gold);
    opacity: 0;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: pulse-center 4s ease-in-out infinite;
  }

  @keyframes drift-warm {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-40px, 30px); }
  }

  @keyframes drift-cool {
    0% { transform: translate(0, 0); }
    100% { transform: translate(30px, -20px); }
  }

  @keyframes pulse-center {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.03; }
  }

  /* ---- Particle field ---- */
  .particle-field {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  .particle-field canvas {
    width: 100%;
    height: 100%;
  }

  /* ---- Grain texture ---- */
  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ---- Main content ---- */
  .container {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 40px 24px;
    max-width: 900px;
    width: 100%;
  }

  /* ---- The Number ---- */
  .debt-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    opacity: 0;
    animation: fade-up 1s ease-out 0.3s forwards;
  }

  .debt-amount {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(72px, 15vw, 160px);
    line-height: 1;
    color: var(--text-primary);
    letter-spacing: -2px;
    margin-bottom: 12px;
    opacity: 0;
    animation: fade-up 1.2s ease-out 0.5s forwards;
    position: relative;
  }

  .debt-amount .dollar {
    font-size: 0.5em;
    font-weight: 400;
    color: var(--gold);
    vertical-align: top;
    position: relative;
    top: 0.15em;
    margin-right: -4px;
  }

  .debt-cents {
    font-size: 0.35em;
    font-weight: 400;
    color: var(--text-muted);
    vertical-align: top;
    position: relative;
    top: 0.25em;
    margin-left: 2px;
  }

  .debt-context {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 64px;
    opacity: 0;
    animation: fade-up 1s ease-out 0.7s forwards;
  }

  .debt-context span {
    color: var(--text-muted);
  }

  /* ---- Divider ---- */
  .divider {
    width: 48px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-bottom: 56px;
    opacity: 0;
    animation: fade-up 1s ease-out 0.9s forwards;
  }

  /* ---- Quote ---- */
  .quote-container {
    max-width: 600px;
    margin-bottom: 72px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fade-up 1s ease-out 1.1s forwards;
  }

  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(20px, 3vw, 28px);
    line-height: 1.6;
    color: var(--text-secondary);
    margin-bottom: 16px;
    transition: opacity 0.8s ease;
  }

  .quote-attribution {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    transition: opacity 0.8s ease;
  }

  .quote-attribution.original {
    color: var(--gold-dim);
    letter-spacing: 2px;
    text-transform: none;
    font-style: italic;
    font-size: 13px;
  }

  /* ---- Tagline ---- */
  .tagline {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    margin-bottom: 40px;
    opacity: 0;
    animation: fade-up 1s ease-out 1.3s forwards;
  }

  /* ---- Email signup ---- */
  .signup {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: fade-up 1s ease-out 1.5s forwards;
  }

  .signup-row {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 400px;
  }

  .signup input[type="email"] {
    flex: 1;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(196, 122, 42, 0.15);
    border-radius: 4px;
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.3s ease, background 0.3s ease;
  }

  .signup input[type="email"]::placeholder {
    color: var(--text-dim);
  }

  .signup input[type="email"]:focus {
    border-color: rgba(196, 122, 42, 0.4);
    background: rgba(255, 255, 255, 0.06);
  }

  .signup button {
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 12px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    cursor: pointer;
    transition: background 0.3s ease, color 0.3s ease;
    white-space: nowrap;
  }

  .signup button:hover {
    background: var(--gold);
    color: var(--bg-deep);
  }

  .signup-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .signup-success {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--gold);
    display: none;
  }

  /* ---- Audio control ---- */
  .audio-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 10;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(196, 122, 42, 0.2);
    background: rgba(10, 12, 16, 0.8);
    backdrop-filter: blur(8px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.4s ease, opacity 0.4s ease;
    opacity: 0;
    animation: fade-up 1s ease-out 2.5s forwards;
  }

  .audio-btn:hover {
    border-color: rgba(196, 122, 42, 0.5);
  }

  .audio-btn svg {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: var(--gold);
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.6;
    transition: opacity 0.3s ease;
  }

  .audio-btn:hover svg {
    opacity: 1;
  }

  /* Equalizer bars animation for playing state */
  .audio-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
  }

  .audio-bars .bar {
    width: 2px;
    background: var(--gold);
    border-radius: 1px;
    opacity: 0.6;
    transition: opacity 0.3s ease;
  }

  .audio-btn:hover .bar {
    opacity: 1;
  }

  .audio-bars .bar:nth-child(1) { animation: eq-1 0.8s ease-in-out infinite; }
  .audio-bars .bar:nth-child(2) { animation: eq-2 0.6s ease-in-out infinite; }
  .audio-bars .bar:nth-child(3) { animation: eq-3 0.7s ease-in-out infinite; }
  .audio-bars .bar:nth-child(4) { animation: eq-4 0.9s ease-in-out infinite; }

  @keyframes eq-1 { 0%, 100% { height: 4px; } 50% { height: 12px; } }
  @keyframes eq-2 { 0%, 100% { height: 8px; } 50% { height: 5px; } }
  @keyframes eq-3 { 0%, 100% { height: 5px; } 50% { height: 14px; } }
  @keyframes eq-4 { 0%, 100% { height: 10px; } 50% { height: 3px; } }

  .audio-bars.paused .bar {
    animation-play-state: paused;
  }

  /* ---- Footer ---- */
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px;
    text-align: center;
    z-index: 2;
  }

  .footer-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .footer-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* ---- Animations ---- */
  @keyframes fade-up {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ---- Mobile ---- */
  @media (max-width: 600px) {
    .container {
      padding: 32px 20px;
    }

    .debt-label {
      font-size: 10px;
      letter-spacing: 4px;
    }

    .debt-amount {
      letter-spacing: -1px;
    }

    .signup-row {
      flex-direction: column;
    }

    .signup button {
      width: 100%;
    }

    .quote-container {
      margin-bottom: 56px;
    }

    .debt-context {
      margin-bottom: 48px;
    }
  }

  /* ---- Reduced motion ---- */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

  <!-- Atmosphere -->
  <div class="atmosphere">
    <div class="glow glow-warm"></div>
    <div class="glow glow-cool"></div>
    <div class="glow glow-center"></div>
  </div>
  <div class="grain"></div>
  <div class="particle-field"><canvas id="particles"></canvas></div>

  <!-- Content -->
  <div class="container">
    <div class="debt-label">Remaining</div>

    <div class="debt-amount" id="debtDisplay">
      <span class="dollar">$</span><span id="debtWhole">502,000</span>
    </div>

    <div class="debt-context">
      started at <span>$502,000</span>
    </div>

    <div class="divider"></div>

    <div class="quote-container">
      <div class="quote-text" id="quoteText"></div>
      <div class="quote-attribution" id="quoteAttribution"></div>
    </div>

    <div class="tagline">A family of six. Ten ventures. One goal.</div>

    <div class="signup" id="signupForm">
      <div class="signup-row">
        <input type="email" id="emailInput" placeholder="your@email.com" aria-label="Email address">
        <button onclick="handleSignup()">Follow</button>
      </div>
      <div class="signup-label">Follow the journey. Nothing else.</div>
    </div>

    <div class="signup-success" id="signupSuccess">
      See you at zero.
    </div>
  </div>

  <!-- Audio -->
  <button class="audio-btn" id="audioBtn" onclick="toggleAudio()" aria-label="Toggle music" title="Toggle music">
    <!-- Play icon (shown when paused) -->
    <svg id="playIcon" viewBox="0 0 24 24">
      <polygon points="6,4 20,12 6,20" fill="var(--gold)" stroke="none" opacity="0.6"/>
    </svg>
    <!-- Equalizer bars (shown when playing) -->
    <div class="audio-bars paused" id="eqBars" style="display:none;">
      <div class="bar" style="height:4px;"></div>
      <div class="bar" style="height:8px;"></div>
      <div class="bar" style="height:5px;"></div>
      <div class="bar" style="height:10px;"></div>
    </div>
  </button>

  <div class="footer">
    <div class="footer-brand">Opus Familiae</div>
    <div class="footer-text">Every dollar earned. Every dollar paid. The whole story.</div>
  </div>

<script>
  // ============================================
  // GAPLESS AUDIO LOOP ENGINE
  // Uses a pre-crossfaded audio file (audio-loop.mp3)
  // where the tail is already blended into the head.
  // Web Audio API schedules overlapping playback to
  // eliminate the native loop gap.
  // ============================================

  (function() {
    let audioCtx = null;
    let audioBuffer = null;
    let isPlaying = false;
    let isLoaded = false;
    let sources = [];
    let masterGain = null;
    let scheduleTimer = null;
    let nextPlayTime = 0;
    const VOLUME = 0.35;
    const OVERLAP = 0.05; // 50ms overlap to cover any decoder gap
    const FADE_IN = 1.5;  // gentle fade in on first play

    async function loadAudio() {
      if (isLoaded) return true;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.connect(audioCtx.destination);
        masterGain.gain.setValueAtTime(0, audioCtx.currentTime);

        // Try the pre-crossfaded loop file first, fall back to original
        let response;
        try {
          response = await fetch('public/assets/audio-loop.mp3');
          if (!response.ok) throw new Error('loop file not found');
        } catch(e) {
          response = await fetch('public/assets/audio.mp3');
        }
        const arrayBuffer = await response.arrayBuffer();
        audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        isLoaded = true;
        return true;
      } catch (e) {
        console.error('Audio load failed:', e);
        return false;
      }
    }

    function scheduleSource(when) {
      const source = audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(masterGain);
      source.start(when);
      sources.push({ source, startTime: when });

      // Clean up finished sources
      source.onended = function() {
        sources = sources.filter(s => s.source !== source);
      };

      return source;
    }

    function startLoop() {
      const now = audioCtx.currentTime;
      const dur = audioBuffer.duration;

      // Fade in gently
      masterGain.gain.setValueAtTime(0, now);
      masterGain.gain.linearRampToValueAtTime(VOLUME, now + FADE_IN);

      // Schedule first play
      scheduleSource(now);
      nextPlayTime = now + dur - OVERLAP;

      // Keep scheduling ahead
      function scheduler() {
        if (!isPlaying) return;
        // Schedule if we're within 1 second of needing the next buffer
        while (nextPlayTime < audioCtx.currentTime + 1.0) {
          scheduleSource(nextPlayTime);
          nextPlayTime += dur - OVERLAP;
        }
        scheduleTimer = setTimeout(scheduler, 250);
      }

      scheduler();
    }

    function stopLoop() {
      if (scheduleTimer) {
        clearTimeout(scheduleTimer);
        scheduleTimer = null;
      }
      if (masterGain && audioCtx) {
        const now = audioCtx.currentTime;
        masterGain.gain.cancelScheduledValues(now);
        masterGain.gain.setValueAtTime(
          Math.max(masterGain.gain.value, 0.001), now
        );
        masterGain.gain.linearRampToValueAtTime(0, now + 1.5);

        // Stop all sources after fade out
        setTimeout(() => {
          sources.forEach(s => {
            try { s.source.stop(); } catch(e) {}
          });
          sources = [];
        }, 2000);
      }
    }

    window.toggleAudio = async function() {
      const playIcon = document.getElementById('playIcon');
      const eqBars = document.getElementById('eqBars');

      if (!isPlaying) {
        const loaded = await loadAudio();
        if (!loaded) return;
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        isPlaying = true;
        startLoop();

        playIcon.style.display = 'none';
        eqBars.style.display = 'flex';
        eqBars.classList.remove('paused');
      } else {
        isPlaying = false;
        stopLoop();

        playIcon.style.display = 'block';
        eqBars.style.display = 'none';
        eqBars.classList.add('paused');
      }
    };
  })();
</script>

<script>
  // ============================================
  // PARTICLE FIELD
  // Faint embers that drift upward, brighten,
  // then disappear. Concentrated in the middle
  // zone around the divider.
  // ============================================

  (function() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animFrame;

    function resize() {
      canvas.width = window.innerWidth * window.devicePixelRatio;
      canvas.height = window.innerHeight * window.devicePixelRatio;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }

    window.addEventListener('resize', resize);
    resize();

    const W = () => window.innerWidth;
    const H = () => window.innerHeight;

    // Particle colors - warm golds and soft whites
    const COLORS = [
      { r: 196, g: 122, b: 42 },   // gold
      { r: 210, g: 150, b: 70 },   // light gold
      { r: 180, g: 140, b: 100 },  // warm sand
      { r: 220, g: 200, b: 170 },  // pale warm
      { r: 200, g: 180, b: 150 },  // muted gold
    ];

    function createParticle() {
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      // Spawn across full width but concentrated in center 60%
      const centerBias = Math.random() < 0.7;
      const x = centerBias
        ? W() * 0.2 + Math.random() * W() * 0.6
        : Math.random() * W();

      // Spawn in the middle vertical band (30%-70% of viewport)
      const y = H() * 0.35 + Math.random() * H() * 0.35;

      return {
        x: x,
        y: y,
        // Very slow upward drift
        vy: -(0.08 + Math.random() * 0.18),
        // Slight horizontal wobble
        vx: (Math.random() - 0.5) * 0.12,
        // Wobble parameters
        wobbleSpeed: 0.003 + Math.random() * 0.008,
        wobbleAmount: 0.3 + Math.random() * 0.5,
        wobbleOffset: Math.random() * Math.PI * 2,
        // Size
        radius: 0.5 + Math.random() * 1.2,
        // Lifecycle
        life: 0,
        maxLife: 200 + Math.random() * 300,
        // Color
        r: color.r,
        g: color.g,
        b: color.b,
        // Max opacity (very faint)
        maxOpacity: 0.08 + Math.random() * 0.18,
      };
    }

    // Seed initial particles
    const MAX_PARTICLES = 35;
    for (let i = 0; i < MAX_PARTICLES * 0.6; i++) {
      const p = createParticle();
      p.life = Math.random() * p.maxLife; // random starting age
      particles.push(p);
    }

    function update() {
      // Spawn new particles to maintain count
      while (particles.length < MAX_PARTICLES) {
        particles.push(createParticle());
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life++;

        // Drift upward
        p.y += p.vy;
        // Horizontal wobble using sine
        p.x += p.vx + Math.sin(p.life * p.wobbleSpeed + p.wobbleOffset) * p.wobbleAmount * 0.1;

        // Remove if expired
        if (p.life >= p.maxLife) {
          particles.splice(i, 1);
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W(), H());

      for (const p of particles) {
        // Opacity curve: fade in (0-20%), full brightness (20-70%), fade out (70-100%)
        const progress = p.life / p.maxLife;
        let opacity;
        if (progress < 0.2) {
          opacity = (progress / 0.2) * p.maxOpacity;
        } else if (progress < 0.7) {
          opacity = p.maxOpacity;
        } else {
          opacity = ((1 - progress) / 0.3) * p.maxOpacity;
        }

        // Subtle brightness pulse
        const pulse = 1 + Math.sin(p.life * 0.02 + p.wobbleOffset) * 0.15;
        opacity *= pulse;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${opacity})`;
        ctx.fill();

        // Soft glow for larger particles
        if (p.radius > 1 && opacity > 0.08) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius * 3, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${opacity * 0.15})`;
          ctx.fill();
        }
      }
    }

    function loop() {
      update();
      draw();
      animFrame = requestAnimationFrame(loop);
    }

    // Respect reduced motion
    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      loop();
    }
  })();
</script>

  }

  function renderQuote() {
    const quotes = CONFIG.quotes;
    // Pick a quote based on the day of year so it's stable for a full day
    // but rotates daily
    const dayOfYear = Math.floor(
      (Date.now() - new Date(new Date().getFullYear(), 0, 0)) / 86400000
    );
    const index = dayOfYear % quotes.length;
    const quote = quotes[index];

    const textEl = document.getElementById('quoteText');
    const attrEl = document.getElementById('quoteAttribution');

    textEl.textContent = '\u201C' + quote.text + '\u201D';

    if (quote.type === 'famous' && quote.attribution) {
      attrEl.textContent = quote.attribution;
      attrEl.className = 'quote-attribution';

      attrEl.textContent = '';
